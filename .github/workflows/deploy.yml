# ====================================================

name: تشغيل سعيد بوت

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  bot:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '18'
    - run: npm install --legacy-peer-deps
    - run: node index.js
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
